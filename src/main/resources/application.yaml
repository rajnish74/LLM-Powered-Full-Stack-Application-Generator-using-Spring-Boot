spring:
  application:
    name: llm-fullstack-gen

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/llmDB}
    username: ${DB_USERNAME:rajnishkushwaha}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8000
